<!-- ANNOUNCEMENT BAR -->

<div class="announcement-bar">
  Get Tested at India ⚡ No1 Genetic DNA Test Lab
</div>

<!-- TOP CATEGORY BAR -->

<div class="top-categories">

  <div class="category-chip">
    DNA Test
  </div>

  <div class="category-chip">
    Pathology
  </div>

  <div class="category-chip">
    Health Checkup
  </div>

  <div class="category-chip">
    Full Body
  </div>

</div>

<!-- STICKY SEARCH HEADER -->

<div class="mobile-top-search">

  <div class="search-wrapper">

    <button
      class="menu-btn"
      (click)="toggleSidebar()"
    >
      ☰
    </button>

    <div class="search-box">
      <app-search-bar />
    </div>

  </div>

</div>

<!-- SIDEBAR -->

<app-mobile-sidebar
  ngSkipHydration
  [isOpen]="isSidebarOpen()"
  (closeSidebar)="closeSidebar()"
>
</app-mobile-sidebar>

<!-- BOTTOM NAVIGATION -->

<nav class="mobile-bottom-nav">

  <!-- MENU -->
  <a
    class="nav-item"
    (click)="toggleSidebar()"
  >
    <span class="icon">☰</span>
    <span class="label">Menu</span>
  </a>

  <!-- TEST -->
  <a class="nav-item" routerLink="/tests">
    <span class="icon">🧬</span>
    <span class="label">Tests</span>
  </a>

  <!-- CENTER LOGO -->
  <a class="center-logo">

    <img
      src="assets/logo-mobile1.png"
      alt="logo"
    />

  </a>

  <!-- REPORT -->
  <a class="nav-item">
    <span class="icon">📄</span>
    <span class="label">Reports</span>
  </a>

  <!-- WHATSAPP -->
  <a
    class="nav-item whatsapp-nav"
    (click)="openWhatsAppChat()"
  >
    <span class="icon">
      <i class="bi bi-whatsapp"></i>
    </span>

    <span class="label">
      WhatsApp
    </span>
  </a>

</nav>

<app-floating-chat></app-floating-chat>
