<div class="container">

  <div
    class="blog-details-page"
    *ngIf="blog"
  >

    <div class="blog-details-layout">

      <!-- LEFT -->
      <div class="blog-content">

        <img [src]="blog.image">

        <h1>
          {{ blog.title }}
        </h1>

        <span>
          {{ blog.date }}
        </span>

        <p>
          {{ blog.fullDescription }}
        </p>

      </div>

      <!-- RIGHT -->
      <div class="blog-sidebar">

        <img
          class="author-image"
          src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?q=80&w=400&auto=format&fit=crop"
        >

        <h3>
          DNA Labs India
        </h3>

        <p>
          DNA Labs India provides advanced genetic
          diagnostics with modern laboratory technology.
        </p>

      </div>

    </div>

  </div>

</div>
